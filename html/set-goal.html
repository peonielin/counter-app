<!DOCTYPE html>
<html>
  <head>
    <title>Counter</title>
    <link rel="stylesheet" href="../css/set-goal-style.css" />
  </head>
  
  <body>
    
  <div class="header">
    <a href="../html/home.html">
      <div class="cross">
        <div class="bar1"></div>
        <div class="bar2"></div>
        <div class="bar3"></div>
      </div>

    </a>
      

  </div>

  <div class="goals-container">
    <div class="goal-name-container">
      <input placeholder="Enter Your Goal" id = "goalName" />
    </div>
    <div class="counting-container">
      
      <h2>Counting</h2>
      
      <div class="counting-detail-container">
        <div class="counting-detail">
      <h3>Target</h3>
      <input placeholder="target" id = "targetNum" />
    </div>
    
    <div class="counting-detail">
      <h3>Start at</h3>
      <input placeholder="0" id = "startingNum" />
    </div>
    
    <div class="counting-detail">
      <h3>Units</h3>
      <input placeholder="units" id = "goalUnits"  />
    </div>

    <div class="counting-detail">
      <h3>Increment</h3>
      <input placeholder="Increment" id = "goalIncrement"  />
    </div>
        
        
      </div>
      <div class="pill-container">
        <a href="../html/home.html" class="pill" id="saveButton">Save</a>
        
      </div>

      
    </div>
    

    
  </div>
  
  

  
  
   <script src="../javascript/set-goal.js"></script>
  </body>
</html>
